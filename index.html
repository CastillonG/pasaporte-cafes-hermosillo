<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasaporte del Café — Hermosillo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <style>
    :root {
      --cream:    #f5ead8;
      --warm:     #f0d9be;
      --sand:     #d8b98a;
      --espresso: #7a3f25;
      --dark:     #3e1f0e;
      --latte:    #d8a47f;
      --foam:     #fdf6ed;
      --green:    #4a7c59;
      --stamp-gold: #c9a227;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--espresso);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .topbar h1 {
      font-family: 'Playfair Display', serif;
      color: var(--cream);
      font-size: 18px;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }

    .nav-tabs {
      display: flex;
      gap: 4px;
    }

    .nav-tab {
      padding: 7px 14px;
      border-radius: 20px;
      background: transparent;
      border: 1.5px solid rgba(245,234,216,.3);
      color: rgba(245,234,216,.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .nav-tab.active, .nav-tab:hover {
      background: rgba(245,234,216,.15);
      color: var(--cream);
      border-color: rgba(245,234,216,.7);
    }

    .nav-tab.active {
      background: rgba(245,234,216,.22);
      border-color: var(--cream);
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── MAP PAGE ── */
    .map-page {
      padding: 16px;
    }

    .searchbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
    }

    .searchbar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid rgba(122,63,37,.25);
      outline: none;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--foam);
      color: var(--espresso);
    }

    .searchbar input:focus { border-color: var(--espresso); }

    .searchbar button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: var(--espresso);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
    }

    .searchbar button:hover { background: var(--dark); }

    .suggestions {
      position: absolute;
      top: 50px;
      left: 0;
      right: 80px;
      background: var(--foam);
      border: 1.5px solid rgba(122,63,37,.2);
      border-radius: 12px;
      overflow: hidden;
      display: none;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(62,31,14,.12);
    }

    .suggestion {
      padding: 11px 14px;
      cursor: pointer;
      font-size: 14px;
      color: var(--espresso);
      border-bottom: 1px solid rgba(122,63,37,.08);
      transition: background .15s;
    }

    .suggestion:last-child { border-bottom: none; }
    .suggestion:hover { background: var(--warm); }

    #map {
      width: 100%;
      height: 70vh;
      border-radius: 16px;
      border: 2px solid rgba(122,63,37,.25);
    }

    /* ── PASSPORT PAGE ── */
    .passport-page {
      padding: 20px 16px;
      max-width: 700px;
      margin: 0 auto;
    }

    .passport-cover {
      background: var(--espresso);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .passport-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 20px,
        rgba(255,255,255,.03) 20px,
        rgba(255,255,255,.03) 40px
      );
    }

    .passport-cover h2 {
      font-family: 'Playfair Display', serif;
      color: var(--cream);
      font-size: 22px;
      letter-spacing: 2px;
      margin-bottom: 4px;
      position: relative;
    }

    .passport-cover .subtitle {
      color: var(--sand);
      font-size: 13px;
      letter-spacing: 1px;
      position: relative;
    }

    .passport-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
      position: relative;
    }

    .stat-box {
      background: rgba(245,234,216,.1);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--cream);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--sand);
      margin-top: 4px;
      letter-spacing: .5px;
    }

    .progress-bar-wrap {
      margin: 16px 0 0;
      position: relative;
    }

    .progress-bar-bg {
      height: 8px;
      background: rgba(245,234,216,.15);
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--stamp-gold);
      border-radius: 20px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    .progress-label {
      font-size: 12px;
      color: var(--sand);
      margin-top: 6px;
      text-align: right;
      position: relative;
    }

    /* Stamps grid */
    .stamps-section h3 {
      font-family: 'Playfair Display', serif;
      color: var(--espresso);
      font-size: 18px;
      margin-bottom: 14px;
    }

    .stamps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
    }

    .stamp-item {
      background: var(--foam);
      border: 2px dashed rgba(122,63,37,.2);
      border-radius: 14px;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }

    .stamp-item:hover { border-color: var(--espresso); transform: translateY(-1px); }

    .stamp-item.stamped {
      background: var(--espresso);
      border: 2px solid var(--stamp-gold);
      box-shadow: 0 4px 12px rgba(122,63,37,.3);
    }

    .stamp-item.stamped::after {
      content: '✓';
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: var(--stamp-gold);
      border-radius: 50%;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      line-height: 18px;
    }

    .stamp-emoji {
      font-size: 26px;
      display: block;
      margin-bottom: 5px;
    }

    .stamp-name {
      font-size: 10px;
      font-weight: 600;
      color: var(--espresso);
      line-height: 1.3;
    }

    .stamp-item.stamped .stamp-name {
      color: var(--cream);
    }

    .stamp-date {
      font-size: 9px;
      color: var(--sand);
      margin-top: 3px;
    }

    .stamp-item.stamped .stamp-date { color: var(--sand); }

    /* ── REWARDS ── */
    .rewards-section {
      margin-top: 24px;
    }

    .rewards-section h3 {
      font-family: 'Playfair Display', serif;
      color: var(--espresso);
      font-size: 18px;
      margin-bottom: 14px;
    }

    .reward-card {
      background: var(--foam);
      border: 1.5px solid rgba(122,63,37,.15);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform .15s;
    }

    .reward-card:hover { transform: translateY(-1px); }

    .reward-icon {
      font-size: 32px;
      flex-shrink: 0;
    }

    .reward-info { flex: 1; }

    .reward-title {
      font-weight: 600;
      color: var(--dark);
      font-size: 15px;
    }

    .reward-desc {
      font-size: 13px;
      color: var(--espresso);
      opacity: .7;
      margin-top: 2px;
    }

    .reward-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .reward-badge.locked {
      background: rgba(122,63,37,.1);
      color: var(--espresso);
    }

    .reward-badge.unlocked {
      background: var(--stamp-gold);
      color: white;
    }

    .reward-badge.claimed {
      background: var(--green);
      color: white;
    }

    /* ── CAFE DETAIL MODAL ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(62,31,14,.5);
      z-index: 2000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .cafe-sheet {
      background: var(--foam);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 700px;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }

    .overlay.open .cafe-sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: rgba(122,63,37,.2);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .sheet-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .sheet-header h2 {
      font-family: 'Playfair Display', serif;
      color: var(--dark);
      font-size: 22px;
      line-height: 1.2;
    }

    .sheet-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(122,63,37,.1);
      border: none;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--espresso);
      transition: background .2s;
    }

    .sheet-close:hover { background: rgba(122,63,37,.2); }

    .sheet-address {
      font-size: 13px;
      color: var(--espresso);
      opacity: .7;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .sheet-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--espresso);
      opacity: .5;
      margin-bottom: 10px;
    }

    .menu-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .menu-tag {
      background: var(--warm);
      border: 1.5px solid rgba(122,63,37,.15);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--espresso);
      font-weight: 500;
    }

    .hours-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(122,63,37,.08);
      font-size: 13px;
      color: var(--dark);
    }

    .hours-row .day { color: var(--espresso); opacity: .7; }

    .hours-open { color: var(--green); font-weight: 600; }

    .checkin-btn {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
    }

    .checkin-btn.unstamped {
      background: var(--espresso);
      color: var(--cream);
    }

    .checkin-btn.unstamped:hover {
      background: var(--dark);
      transform: translateY(-1px);
    }

    .checkin-btn.stamped {
      background: var(--stamp-gold);
      color: white;
    }

    .checkin-btn.visited {
      background: rgba(122,63,37,.1);
      color: var(--espresso);
      cursor: default;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--espresso);
      color: var(--cream);
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(62,31,14,.25);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .topbar h1 { font-size: 14px; }
      .nav-tab { padding: 6px 10px; font-size: 12px; }
      .stamps-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <h1>☕ PASAPORTE</h1>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('map')">Mapa</button>
      <button class="nav-tab" onclick="switchPage('passport')">Mi Pasaporte</button>
    </div>
  </div>

  <!-- MAP PAGE -->
  <div class="page active map-page" id="page-map">
    <div class="searchbar">
      <input id="searchInput" type="text" placeholder="Buscar café…" autocomplete="off"/>

      <div id="suggestions" class="suggestions"></div>
    </div>
    <div id="map"></div>
  </div>

  <!-- PASSPORT PAGE -->
  <div class="page passport-page" id="page-passport">

    <!-- Cover card -->
    <div class="passport-cover">
      <h2>PASAPORTE DEL CAFÉ</h2>
      <div class="subtitle">HERMOSILLO, SONORA</div>
      <div class="passport-stats">
        <div class="stat-box">
          <div class="stat-num" id="stat-visited">0</div>
          <div class="stat-label">Visitados</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-total">33</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-pct">0%</div>
          <div class="stat-label">Completado</div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progress-label">0 de 33 sellos</div>
      </div>
    </div>

    <!-- Rewards -->
    <div class="rewards-section">
      <h3>Recompensas</h3>
      <div id="rewards-list"></div>
    </div>

    <!-- Stamps -->
    <div class="stamps-section" style="margin-top:24px;">
      <h3>Mis Sellos</h3>
      <div class="stamps-grid" id="stamps-grid"></div>
    </div>

  </div>

  <!-- CAFE DETAIL SHEET -->
  <div class="overlay" id="overlay" onclick="closeSheet(event)">
    <div class="cafe-sheet" id="cafe-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2 id="sheet-name">—</h2>
        <button class="sheet-close" onclick="closeOverlay()">✕</button>
      </div>
      <div class="sheet-address" id="sheet-address">📍 —</div>

      <div class="sheet-section-title">Especialidades</div>
      <div class="menu-tags" id="sheet-menu"></div>

      <div class="sheet-section-title">Horarios</div>
      <div id="sheet-hours"></div>

      <button class="checkin-btn" id="checkin-btn" onclick="doCheckin()">
        Registrar Visita ☕
      </button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

      { name:"Tomomi Café", address:"C. Juan Aldama 13, San Benito", coords:[29.090454,-110.963957], menu:["Matcha","Mochi","Café Japonés","Onigiri"], hours:{lun:"9–21",mar:"9–21",mie:"9–21",jue:"9–21",vie:"9–22",sab:"10–22",dom:"10–19"} },
      { name:"zanati coffee and tea house", address:"Oposura 153, Centro", coords:[29.073770,-110.955393], menu:["Té de Especialidad","Single Origin","Oolong","Pan"], hours:{lun:"9–21",mar:"9–21",mie:"9–21",jue:"9–21",vie:"9–22",sab:"10–22",dom:"10–20"} },
      { name:"Casazul coffee and bakery", address:"Av. Campeche 1875, Bahía de Kino", coords:[28.861529,-112.008140], menu:["Pan Artesanal","Espresso","Pasteles","Jugos"], hours:{lun:"8–18",mar:"8–18",mie:"8–18",jue:"8–18",vie:"8–19",sab:"9–19",dom:"9–16"} },
      { name:"Meri Meri Coffee Community", address:"Blvd. Manlio Fabio Beltrones 717, San Carlos", coords:[27.962812,-111.026543], menu:["Specialty Coffee","Malteadas","Pancakes","Tacos"], hours:{lun:"8–21",mar:"8–21",mie:"8–21",jue:"8–21",vie:"8–22",sab:"9–22",dom:"10–20"} },
      { name:"PALOMINA COFFEE SHOP", address:"Los Pinitos, Sonora", coords:[29.235063,-110.887409], menu:["Café de Rancho","Atole","Pan Sonorense","Burritos"], hours:{lun:"7–19",mar:"7–19",mie:"7–19",jue:"7–19",vie:"7–20",sab:"8–20",dom:"8–17"} }
    ];

    const REWARDS = [
      { id:'r1', title:'Primera Taza', desc:'Visita tu primer café del pasaporte', icon:'☕', need:1 },
      { id:'r2', title:'Explorador Novato', desc:'Visita 5 cafés diferentes', icon:'🗺️', need:5 },
      { id:'r3', title:'Amante del Café', desc:'Visita 10 cafés diferentes', icon:'❤️', need:10 },
      { id:'r4', title:'Pasaporte a Medias', desc:'Completa la mitad del pasaporte', icon:'📖', need:Math.ceil(cafes.length/2) },
      { id:'r5', title:'Gran Explorador', desc:'Visita 25 cafés del pasaporte', icon:'🏆', need:25 },
      { id:'r6', title:'Pasaporte Completo', desc:'¡Visita todos los cafés asociados!', icon:'⭐', need:cafes.length }
    ];

    // ──────────────────────────────────────────────
    // STATE (localStorage)
    // ──────────────────────────────────────────────
    function loadVisited() {
      try { return JSON.parse(localStorage.getItem('cafeVisited') || '{}'); }
      catch { return {}; }
    }

    function saveVisited(v) {
      localStorage.setItem('cafeVisited', JSON.stringify(v));
    }

    let visited = loadVisited();
    let currentCafe = null;

    // ──────────────────────────────────────────────
    // HELPERS
    // ──────────────────────────────────────────────
    function normalize(s) {
      return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    }

    function visitedCount() { return Object.keys(visited).length; }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ──────────────────────────────────────────────
    // PAGE NAVIGATION
    // ──────────────────────────────────────────────
    function switchPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      event.target.classList.add('active');
      if (id === 'passport') renderPassport();
    }

    // ──────────────────────────────────────────────
    // MAP
    // ──────────────────────────────────────────────
    const map = L.map('map', { minZoom:12, maxZoom:18 }).setView([29.072967,-110.955919], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      minZoom:12, maxZoom:18,
      attribution:'&copy; OpenStreetMap contributors'
    }).addTo(map);

    const cafeIcon = L.divIcon({
      className:'',
      html:'<div style="font-size:42px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.22));">📍</div>',
      iconSize:[40,40], iconAnchor:[20,38], popupAnchor:[0,-38]
    });

    const visitedIcon = L.divIcon({
      className:'',
      html:'<div style="font-size:42px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.22));">✅</div>',
      iconSize:[40,40], iconAnchor:[20,38], popupAnchor:[0,-38]
    });

    const markersByName = new Map();

    cafes.forEach(c => {
      const isVisited = !!visited[c.name];
      const marker = L.marker(c.coords, { icon: isVisited ? visitedIcon : cafeIcon })
        .addTo(map)
        .bindPopup('<b>' + c.name + '</b><br><small>' + c.address + '</small><br><br><a href="#" onclick="openCafeSheet(\'' + encodeURIComponent(c.name) + '\');return false;" style="color:#7a3f25;font-weight:600;">Ver detalles →</a>');
      markersByName.set(normalize(c.name), { cafe:c, marker });
    });

    function refreshMarkers() {
      cafes.forEach(c => {
        const obj = markersByName.get(normalize(c.name));
        if (!obj) return;
        obj.marker.setIcon(visited[c.name] ? visitedIcon : cafeIcon);
      });
    }

    setTimeout(() => map.invalidateSize(), 250);

    // Geolocation
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const userCoords = [pos.coords.latitude, pos.coords.longitude];
        L.circleMarker(userCoords, {
          radius:7, color:'#2b7cff', fillColor:'#2b7cff', fillOpacity:.9
        }).addTo(map).bindPopup('Tu ubicación 📍');
        map.setView(userCoords, 15);
      }, () => {}, { enableHighAccuracy:true, timeout:15000, maximumAge:0 });
    }

    // ──────────────────────────────────────────────
    // SEARCH
    // ──────────────────────────────────────────────
    const input = document.getElementById('searchInput');
    const btn = document.getElementById('searchBtn');
    const suggestions = document.getElementById('suggestions');

    function showSuggestions(list) {
      suggestions.innerHTML = '';
      if (!list.length) { suggestions.style.display='none'; return; }
      list.slice(0,6).forEach(c => {
        const d = document.createElement('div');
        d.className = 'suggestion';
        d.textContent = c.name;
        if (visited[c.name]) d.textContent += ' ✓';
        d.onclick = () => { input.value=c.name; suggestions.style.display='none'; goToCafe(c.name); };
        suggestions.appendChild(d);
      });
      suggestions.style.display = 'block';
    }

    function goToCafe(query) {
      const q = normalize(query);
      if (!q) return;
      const obj = markersByName.get(q) || (() => {
        const found = cafes.find(c => normalize(c.name).includes(q));
        return found ? markersByName.get(normalize(found.name)) : null;
      })();
      if (obj) { map.setView(obj.cafe.coords, 17); obj.marker.openPopup(); }
      else alert('No encontré ese café.');
    }

    input.addEventListener('input', () => {
      const q = normalize(input.value);
      if (!q) { suggestions.style.display='none'; return; }
      showSuggestions(cafes.filter(c => normalize(c.name).includes(q)));
    });

    input.addEventListener('keydown', e => {
      if (e.key==='Enter') { suggestions.style.display='none'; goToCafe(input.value); }
    });

    btn.addEventListener('click', () => { suggestions.style.display='none'; goToCafe(input.value); });

    document.addEventListener('click', e => {
      if (!e.target.closest('.searchbar')) suggestions.style.display='none';
    });

    // ──────────────────────────────────────────────
    // CAFE DETAIL SHEET
    // ──────────────────────────────────────────────
    function openCafeSheet(encodedName) {
      const name = decodeURIComponent(encodedName);
      const cafe = cafes.find(c => c.name === name);
      if (!cafe) return;
      currentCafe = cafe;

      document.getElementById('sheet-name').textContent = cafe.name;
      document.getElementById('sheet-address').textContent = '📍 ' + cafe.address;

      // Menu tags
      const menuEl = document.getElementById('sheet-menu');
      menuEl.innerHTML = cafe.menu.map(m => `<span class="menu-tag">${m}</span>`).join('');

      // Hours
      const dayNames = { lun:'Lun', mar:'Mar', mie:'Mié', jue:'Jue', vie:'Vie', sab:'Sáb', dom:'Dom' };
      const hoursEl = document.getElementById('sheet-hours');
      hoursEl.innerHTML = Object.entries(cafe.hours).map(([d,h]) =>
        `<div class="hours-row"><span class="day">${dayNames[d]}</span><span class="${h==='Cerrado'?'':'hours-open'}">${h}</span></div>`
      ).join('');

      // Checkin button
      const btn = document.getElementById('checkin-btn');
      const v = visited[cafe.name];
      if (v) {
        btn.textContent = '✓ Visitado el ' + v;
        btn.className = 'checkin-btn visited';
      } else {
        btn.textContent = 'Registrar Visita ☕';
        btn.className = 'checkin-btn unstamped';
      }

      document.getElementById('overlay').classList.add('open');
    }

    // Make openCafeSheet global for popup links
    window.openCafeSheet = openCafeSheet;

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('open');
    }

    function closeSheet(e) {
      if (e.target === document.getElementById('overlay')) closeOverlay();
    }

    function doCheckin() {
      if (!currentCafe) return;
      if (visited[currentCafe.name]) return;

      const today = new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });
      visited[currentCafe.name] = today;
      saveVisited(visited);
      refreshMarkers();

      const btn = document.getElementById('checkin-btn');
      btn.textContent = '✓ Visitado el ' + today;
      btn.className = 'checkin-btn visited';

      const count = visitedCount();
      showToast('¡Sello agregado! Llevas ' + count + ' de ' + cafes.length + ' cafés ☕');

      // Check if any reward just unlocked
      REWARDS.forEach(r => {
        if (count === r.need) showToast('🏆 ¡Recompensa desbloqueada: ' + r.title + '!');
      });
    }

    // ──────────────────────────────────────────────
    // PASSPORT RENDER
    // ──────────────────────────────────────────────
    function renderPassport() {
      const count = visitedCount();
      const total = cafes.length;
      const pct = Math.round(count / total * 100);

      document.getElementById('stat-visited').textContent = count;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = count + ' de ' + total + ' sellos';

      // Rewards
      const rewardsList = document.getElementById('rewards-list');
      rewardsList.innerHTML = REWARDS.map(r => {
        let badgeClass = 'locked', badgeText = r.need + ' cafés';
        if (count >= r.need) { badgeClass = 'unlocked'; badgeText = '¡Desbloqueado!'; }
        return `
          <div class="reward-card">
            <div class="reward-icon">${r.icon}</div>
            <div class="reward-info">
              <div class="reward-title">${r.title}</div>
              <div class="reward-desc">${r.desc}</div>
            </div>
            <div class="reward-badge ${badgeClass}">${badgeText}</div>
          </div>`;
      }).join('');

      // Stamps
      const grid = document.getElementById('stamps-grid');
      grid.innerHTML = cafes.map(c => {
        const v = visited[c.name];
        return `
          <div class="stamp-item ${v ? 'stamped' : ''}" onclick="openCafeSheetFromPassport('${encodeURIComponent(c.name)}')">
            <span class="stamp-emoji">${v ? '☕' : '○'}</span>
            <div class="stamp-name">${c.name}</div>
            ${v ? `<div class="stamp-date">${v}</div>` : ''}
          </div>`;
      }).join('');
    }

    function openCafeSheetFromPassport(encodedName) {
      // Switch to map tab first, then open sheet
      openCafeSheet(encodedName);
    }
    window.openCafeSheetFromPassport = openCafeSheetFromPassport;

  }); // end window.addEventListener('load')
  </script>
</body>
