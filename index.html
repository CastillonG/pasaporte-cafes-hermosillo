<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pasaporte del Café</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f4e4d6;
      font-family: Arial, sans-serif;
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 1000px;
      background: #d8a47f;
      border-radius: 20px;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      margin: 0 0 15px 0;
      color: #7a3f25;
      letter-spacing: 2px;
    }

    #map {
      width: 100%;
      height: 70vh;
      border: 3px dotted #7a3f25;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>PASAPORTE DEL CAFÉ</h1>
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([29.072967, -110.955919], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Icono 📍☕
  const cafeIcon = L.divIcon({
    html: '<div style="font-size:30px;">📍☕</div>',
    className: '',
    iconSize: [30, 30],
    iconAnchor: [15, 30]
  });

  // Coordenadas directas (evitamos fetch para que no falle)
  const lat = 29.0875;
  const lon = -110.9657;

  L.marker([lat, lon], { icon: cafeIcon })
    .addTo(map)
    .bindPopup("C. Benito Juárez 211<br>Hermosillo")
    .openPopup();

  map.setView([lat, lon], 17);
</script>

</body>
</html>
