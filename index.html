<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Hermosillo</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #f4e4d6; /* fondo beige claro */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    /* Marco café clarito naranjoso */
    .marco {
      width: 95%;
      height: 90%;
      background-color: #d8a47f; /* café claro naranjoso */
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #map {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="marco">
    <div id="map"></div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    const hermosillo = [29.072967, -110.955919];

    const map = L.map("map").setView(hermosillo, 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    map.on("click", (e) => {
      const { lat, lng } = e.latlng;
      L.marker([lat, lng]).addTo(map)
        .bindPopup(`Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}`)
        .openPopup();
    });
  </script>

</body>
</html>
