<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Hermosillo</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body { height: 100%; margin: 0; }
    /* Mapa centrado y responsivo */
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // Centro aproximado de Hermosillo, Sonora
    const hermosillo = [29.072967, -110.955919];

    const map = L.map("map", {
      zoomControl: true
    }).setView(hermosillo, 13);

    // OpenStreetMap tiles (gratis)
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Ejemplo: marcador (puedes borrar este si quieres)
    // L.marker(hermosillo).addTo(map).bindPopup("Hermosillo").openPopup();

    // BONUS: click para ver coordenadas y crear marcador (útil para “marcar lugares posteriormente”)
    map.on("click", (e) => {
      const { lat, lng } = e.latlng;
      L.marker([lat, lng]).addTo(map)
        .bindPopup(`Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}`)
        .openPopup();
      console.log("Coordenadas:", lat, lng);
    });
  </script>
</body>
</html>
