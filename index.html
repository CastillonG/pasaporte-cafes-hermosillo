<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Centro base (Hermosillo)
  const hermosillo = [29.072967, -110.955919];

  // Crear mapa
  const map = L.map("map", { zoomControl: true }).setView(hermosillo, 13);

  // Tiles OSM
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Icono personalizado: ubicación + café
  const cafeIcon = L.divIcon({
    className: "cafe-icon",
    html: `
      <div style="
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:34px;
        line-height:1;
        transform: translateY(-8px);
        filter: drop-shadow(0 6px 10px rgba(0,0,0,.25));
      ">📍☕</div>
    `,
    iconSize: [40, 40],
    iconAnchor: [20, 40],
    popupAnchor: [0, -36]
  });

  // Dirección a marcar
  const direccion = "C. Benito Juárez 211, Issste Federal, 83157 Hermosillo, Sonora, Mexico";

  // Geocoding con Nominatim (OSM)
  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(direccion)}`, {
    headers: { "Accept-Language": "es" }
  })
    .then(r => r.json())
    .then(data => {
      if (!data || data.length === 0) return;

      const lat = parseFloat(data[0].lat);
      const lon = parseFloat(data[0].lon);

      L.marker([lat, lon], { icon: cafeIcon })
        .addTo(map)
        .bindPopup(`<b>Pasaporte del Café</b><br>${direccion}`)
        .openPopup();

      map.setView([lat, lon], 17);
      setTimeout(() => map.invalidateSize(), 250);
    })
    .catch(() => {
      // si falla el geocoding, al menos asegura que el mapa se vea
      setTimeout(() => map.invalidateSize(), 250);
    });

  // Click para agregar marcadores con coordenadas
  map.on("click", (e) => {
    const { lat, lng } = e.latlng;
    L.marker([lat, lng]).addTo(map)
      .bindPopup(`Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}`)
      .openPopup();
  });

  // Anti-bug tamaño en móvil
  setTimeout(() => map.invalidateSize(), 250);
</script>
