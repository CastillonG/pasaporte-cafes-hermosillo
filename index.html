<script>
  // Crear mapa
  const map = L.map('map').setView([29.072967, -110.955919], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Icono grande 📍☕
  const cafeIcon = L.divIcon({
    className: '',
    html: '<div style="font-size:70px; line-height:1; transform:translateY(-10px); filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));">📍☕</div>',
    iconSize: [110, 110],
    iconAnchor: [55, 110],
    popupAnchor: [0, -95]
  });

const cafes = [
  {
    name: "211 Barra Café",
    address: "C. Benito Juárez 211, Issste Federal, 83157 Hermosillo, Son.",
    coords: [29.105567208771888, -110.95285255920402]
  },
];

  // Crear marcadores y guardarlos
  const markersByName = new Map();

  cafes.forEach(c => {
    const m = L.marker(c.coords, { icon: cafeIcon })
      .addTo(map)
      .bindPopup(`<b>${c.name}</b><br>${c.address}`);
    markersByName.set(normalize(c.name), { cafe: c, marker: m });
  });

  // Enfocar al primero al cargar
  map.setView(cafes[0].coords, 18);
  markersByName.get(normalize(cafes[0].name)).marker.openPopup();
  setTimeout(() => map.invalidateSize(), 250);

  // ---- BUSCADOR ----
  const input = document.getElementById("searchInput");
  const btn = document.getElementById("searchBtn");
  const suggestions = document.getElementById("suggestions");

  function normalize(s){
    return (s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // quita acentos
      .trim();
  }

  function showSuggestions(list){
    suggestions.innerHTML = "";
    if (!list.length){
      suggestions.style.display = "none";
      return;
    }
    list.slice(0, 6).forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.textContent = item.name;
      div.onclick = () => {
        input.value = item.name;
        suggestions.style.display = "none";
        goToCafe(item.name);
      };
      suggestions.appendChild(div);
    });
    suggestions.style.display = "block";
  }

  function goToCafe(query){
    const q = normalize(query);

    // match exacto por nombre
    if (markersByName.has(q)){
      const { cafe, marker } = markersByName.get(q);
      map.setView(cafe.coords, 18);
      marker.openPopup();
      return;
    }

    // match parcial
    const found = cafes.find(c => normalize(c.name).includes(q));
    if (found){
      const { marker } = markersByName.get(normalize(found.name));
      map.setView(found.coords, 18);
      marker.openPopup();
      return;
    }

    alert("No encontré ese café. Revisa el nombre.");
  }

  input.addEventListener("input", () => {
    const q = normalize(input.value);
    if (!q) { suggestions.style.display = "none"; return; }
    const matches = cafes.filter(c => normalize(c.name).includes(q));
    showSuggestions(matches);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      suggestions.style.display = "none";
      goToCafe(input.value);
    }
  });

  btn.addEventListener("click", () => {
    suggestions.style.display = "none";
    goToCafe(input.value);
  });

  // click fuera cierra sugerencias
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".searchbar")) suggestions.style.display = "none";
  });
</script>
