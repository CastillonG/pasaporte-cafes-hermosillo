<script>
  // 1) Mapa base
  const map = L.map('map').setView([29.072967, -110.955919], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // 2) Icono gigante 📍☕ (sin template strings para evitar errores)
  const cafeIcon = L.divIcon({
    className: '',
    html:
      '<div style="' +
        'display:flex;' +
        'align-items:center;' +
        'justify-content:center;' +
        'font-size:70px;' +               /* 👈 tamaño del emoji */
        'line-height:1;' +
        'transform:translateY(-10px);' +
        'filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));' +
      '">📍☕</div>',
    iconSize: [110, 110],     // 👈 espacio del icono
    iconAnchor: [55, 110],    // 👈 “punta” del marcador
    popupAnchor: [0, -95]
  });

  // 3) Punto 211 Barra Café (coordenadas aprox)
  const puntoCafe = [29.08752, -110.96573];

  L.marker(puntoCafe, { icon: cafeIcon })
    .addTo(map)
    .bindPopup('<b>211 Barra Café</b><br>C. Benito Juárez 211, Issste Federal, 83157 Hermosillo, Son.')
    .openPopup();

  map.setView(puntoCafe, 18);

  // 4) Click para agregar marcadores
  map.on('click', (e) => {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;
    L.marker([lat, lng]).addTo(map)
      .bindPopup('Lat: ' + lat.toFixed(6) + '<br>Lng: ' + lng.toFixed(6))
      .openPopup();
  });

  // 5) Anti-bug móvil
  setTimeout(() => map.invalidateSize(), 250);
</script>
