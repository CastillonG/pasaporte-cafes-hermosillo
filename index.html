<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasaporte del Café</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body{
      margin:0;
      padding:0;
      height:100%;
      background:#f4e4d6;
      font-family: Arial, sans-serif;
    }

    .container{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      box-sizing:border-box;
    }

    .card{
      width:100%;
      max-width:1000px;
      background:#d8a47f;
      border-radius:20px;
      padding:18px;
      box-sizing:border-box;
      box-shadow: 0 18px 55px rgba(0,0,0,0.18);
    }

    h1{
      text-align:center;
      margin:0 0 12px 0;
      color:#7a3f25;
      letter-spacing:2px;
      font-size:20px;
    }

    /* BUSCADOR */
    .searchbar{
      display:flex;
      gap:10px;
      align-items:center;
      margin: 0 0 12px 0;
      position: relative;
    }

    .searchbar input{
      flex:1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid rgba(122,63,37,.35);
      outline: none;
      font-size: 14px;
      background: rgba(244,228,214,.9);
      color: #7a3f25;
      box-sizing: border-box;
    }

    .searchbar input:focus{
      border-color: rgba(122,63,37,.7);
    }

    .searchbar button{
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid rgba(122,63,37,.35);
      background: rgba(244,228,214,.9);
      color: #7a3f25;
      font-weight: 700;
      cursor: pointer;
      box-sizing: border-box;
    }

    .suggestions{
      position:absolute;
      top: 48px;
      left: 0;
      right: 150px; /* espacio para el botón */
      background: rgba(244,228,214,.98);
      border: 2px solid rgba(122,63,37,.25);
      border-radius: 12px;
      overflow: hidden;
      display:none;
      z-index: 9999;
    }

    .suggestion{
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      color:#7a3f25;
    }

    .suggestion:hover{
      background: rgba(216,164,127,.35);
    }

    #map{
      width:100%;
      height:70vh;
      border:3px dotted #7a3f25;
      border-radius:15px;
      background:#fff;
    }
  
    @media (max-width: 480px){
      .searchbar button{ padding:12px 10px; }
      .suggestions{ right: 82px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>PASAPORTE DEL CAFÉ</h1>

      <!-- ✅ BUSCADOR -->
      <div class="searchbar">
        <input id="searchInput" type="text" placeholder="Escribe Café..." autocomplete="off" />
       <button id="searchBtn">Buscar</button>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ---- Helpers ----
    function normalize(s){
      return (s || "")
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    // ---- Map ----
    const map = L.map('map').setView([29.072967, -110.955919], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const cafeIcon = L.divIcon({
  className: '',
  html: '<div style="font-size:54px; line-height:1; filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));">📍☕</div>',
  iconSize: [60, 60],
  iconAnchor: [30, 55],
  popupAnchor: [0, -50]
});

    // ✅ CAFÉS
    const cafes = [

      }

      },
      {

        coords: [29.089694327994355, -110.96556932991658]
      },
      {

        address: "Segunda de Obregón 140, El Centenario, 83000 Hermosillo, Son.",
        coords: [29.077396545553707, -110.95831623251213]
      }
      ,
      {

        coords: [29.089406537137965, -111.00733081671916]
      },
      {

        coords: [29.076618035564465, -110.94763107623878]
        },
      {

        coords: [29.100452320630676, -110.95029740137704]
        },
      {
        name: "El Chapucero | Café",

        coords: [29.07526521180525, -110.96141590137788]
        },
      {

        coords: [29.088434029105446, -110.96333520322565]
        },
      {

        address: "Esquina con, Avenida Doctor Noriega, Calle Gral. José María Yáñez 136A, 83000 Hermosillo, Son.",

        },

      {

      {

      {

      {

      {

      {

        coords : [29.10875136552883, -110.94994971671878]
      },
      {
        name: "Tomomi Café",
        address: "C. Juan Aldama 13, San Benito, 83190 Hermosillo, Son.",
        coords : [29.09045422627546, -110.96395791856759]
      },
      {
        name: "zanati coffee and tea house",
        address: "con, Calle mina, Oposura 153, Centro, 83000 Hermosillo, Son.",
        coords : [29.07377082341835, -110.9553939425576]
      },
      {
        name: "Casazul coffee and bakery",
        address: "Av. Campeche 1875, 83343 Bahía de Kino, Son.",
        coords : [28.861529813131476, -112.00814071692837]
      },
      {
        name: "Meri Meri Coffee Community",
        address: "Frente al malecón, a lado del cerro El Crestón, Blvd Manlio Fabio Beltrones, Crestón 717, 85506 San Carlos, Son.",
        coords : [27.96281246757789, -111.02654323209421]
      },
      {
        name: "PALOMINA COFFEE SHOP",
        address: "64M6+XX, 83300 Los Pinitos, Son.",
        coords : [29.235063735470405, -110.88740913020855]
      }

    ];

    

    // Marcadores indexados
    const markersByName = new Map();

    cafes.forEach(c => {
      const marker = L.marker(c.coords, { icon: cafeIcon })
        .addTo(map)
        .bindPopup('<b>' + c.name + '</b><br>' + c.address);
      markersByName.set(normalize(c.name), { cafe: c, marker });
    });

    // Arranque (primero)
    map.setView(cafes[0].coords, 15);
    setTimeout(() => map.invalidateSize(), 250);

    // ---- Search UI ----
    const input = document.getElementById("searchInput");
    const btn = document.getElementById("searchBtn");
    const suggestions = document.getElementById("suggestions");

    function showSuggestions(list){
      suggestions.innerHTML = "";
      if (!list.length){ suggestions.style.display = "none"; return; }

      list.slice(0, 6).forEach(item => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.textContent = item.name;
        div.onclick = () => {
          input.value = item.name;
          suggestions.style.display = "none";
          goToCafe(item.name);
        };
        suggestions.appendChild(div);
      });

      suggestions.style.display = "block";
    }

    function goToCafe(query){
      const q = normalize(query);
      if (!q) return;

      // exact match
      if (markersByName.has(q)){
        const obj = markersByName.get(q);
        map.setView(obj.cafe.coords, 18);
        obj.marker.openPopup();
        return;
      }

      // partial match
      const found = cafes.find(c => normalize(c.name).includes(q));
      if (found){
        const obj = markersByName.get(normalize(found.name));
        map.setView(found.coords, 18);
        obj.marker.openPopup();
        return;
      }

      alert("No encontré ese café. Intenta con otro nombre.");
    }

    input.addEventListener("input", () => {
      const q = normalize(input.value);
      if (!q){ suggestions.style.display = "none"; return; }
      const matches = cafes.filter(c => normalize(c.name).includes(q));
      showSuggestions(matches);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter"){
        suggestions.style.display = "none";
        goToCafe(input.value);
      }
    });

    btn.addEventListener("click", () => {
      suggestions.style.display = "none";
      goToCafe(input.value);
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".searchbar")) suggestions.style.display = "none";
    });
// --- UBICACIÓN ACTUAL AUTOMÁTICA (sin círculo azul) ---
let userMarker = null;

if (navigator.geolocation) {

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const userCoords = [lat, lng];

      // marcador simple azul
      userMarker = L.circleMarker(userCoords, {
        radius: 7,
        color: "#2b7cff",
        fillColor: "#2b7cff",
        fillOpacity: 0.9
      }).addTo(map)
        .bindPopup("Tu ubicación 📍");

      map.setView(userCoords, 16);
    },
    (err) => {
      console.log("Error ubicación:", err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }
  );

}

</html>
