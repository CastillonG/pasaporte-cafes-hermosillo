<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Hermosillo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #f4e4d6;
}

.wrapper {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

.marco {
  width: 100%;
  max-width: 1000px;
  height: 90vh;
  background: #d89a6a;
  border-radius: 20px;
  padding: 20px;
  box-sizing: border-box;
}

#map {
  width: 100%;
  height: 100%;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="marco">
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const map = L.map('map').setView([29.072967, -110.955919], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

});
</script>

</body>
</html>
