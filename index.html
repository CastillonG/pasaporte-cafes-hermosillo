<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const hermosillo = [29.072967, -110.955919];

const map = L.map("map").setView(hermosillo, 13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

/* --- ICONO PERSONALIZADO 📍☕ --- */
const cafeIcon = L.divIcon({
  html: `
    <div style="
      font-size:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      transform: translateY(-10px);
    ">
      📍☕
    </div>
  `,
  className: "",
  iconSize: [30, 30],
  iconAnchor: [15, 30]
});

/* --- BUSCAR DIRECCIÓN AUTOMÁTICAMENTE --- */
const direccion = "C. Benito Juárez 211, Issste Federal, 83157 Hermosillo, Sonora";

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(direccion)}`)
  .then(res => res.json())
  .then(data => {
    if (data.length > 0) {
      const lat = parseFloat(data[0].lat);
      const lon = parseFloat(data[0].lon);

      const marker = L.marker([lat, lon], { icon: cafeIcon }).addTo(map)
        .bindPopup("<b>Pasaporte del Café</b><br>C. Benito Juárez 211")
        .openPopup();

      map.setView([lat, lon], 17);
    }
  });

map.on("click", (e) => {
  const { lat, lng } = e.latlng;
  L.marker([lat, lng]).addTo(map)
    .bindPopup(`Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}`)
    .openPopup();
});
</script>
