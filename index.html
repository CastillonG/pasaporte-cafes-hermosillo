}<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasaporte del Café</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #f4e4d6;
  font-family: Arial, sans-serif;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

.card {
  width: 100%;
  max-width: 1000px;
  background: #d8a47f;
  border-radius: 20px;
  padding: 20px;
  box-sizing: border-box;
}

h1 {
  text-align: center;
  margin: 0 0 15px 0;
  color: #7a3f25;
  letter-spacing: 2px;
}

#map {
  width: 100%;
  height: 70vh;
  border: 3px dotted #7a3f25;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>PASAPORTE DEL CAFÉ</h1>
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Crear mapa
const map = L.map('map').setView([29.072967, -110.955919], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Icono grande 📍☕
const cafeIcon = L.divIcon({
  className: '',
  html: '<div style="font-size:70px; line-height:1; transform:translateY(-10px); filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));">📍☕</div>',
  iconSize: [110, 110],
  iconAnchor: [55, 110],
  popupAnchor: [0, -95]
});

// Coordenadas 211 Barra Café
const puntoCafe = [29.08752, -110.96573];

L.marker(puntoCafe, { icon: cafeIcon })
  .addTo(map)
  .bindPopup('<b>211 Barra Café</b><br>C. Benito Juárez 211, Issste Federal, 83157 Hermosillo, Son.')
  .openPopup();

map.setView(puntoCafe, 18);

setTimeout(() => map.invalidateSize(), 250);
</script>

</body>
</html>
